[params.giscus]
  repo = "DBJARH/DBJ_ICEBERG"
  repoId = "R_kgDOSkKOjw"
  category = "General"
  categoryId = "DIC_kwDOSkKOj84C-RO1"
  mapping = "pathname"
  strict = "0"
  reactionsEnabled = "1"
  emitMetadata = "0"
  inputPosition = "top"
  theme = "preferred_color_scheme"
  lang = "en"
  loading = "lazy"

[markup.goldmark.renderer]
  unsafe = true

[outputs]
  home = ['HTML', 'RSS', 'JSON']

