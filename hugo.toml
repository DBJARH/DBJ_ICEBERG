baseURL = 'https://dbjarh.github.io/DBJ_ICEBERG/'
languageCode = 'en-us'
title = 'DBJ Iceberg'
theme = 'PaperMod'
paginate = 10

[params]
  author = 'Dusan B. Jovanovic'
  description = 'EA AI ROI — Enterprise Architecture for organisations that feel small, poor, and vulnerable.'
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  defaultTheme = 'auto'
  homeInfoParams = { Title = 'DBJ Iceberg', Content = 'Enterprise Architecture advice for SMEs navigating AI adoption. Grounded in TOGAF, free of hype.' }

[params.profileMode]
  enabled = false

[[params.socialIcons]]
  name = 'github'
  url = 'https://github.com/DBJARH'

[outputs]
  home = ['HTML', 'RSS', 'JSON']

[menu]
  [[menu.main]]
    name = 'Posts'
